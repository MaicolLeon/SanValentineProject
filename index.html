<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Marcellus&family=Caesar+Dressing&display=swap" rel="stylesheet">
        <title>san valentine cards</title>

    </head>
    <body>  
        <div id="card-wrapper">
           <section class="card-header">
                 <!-- <img width="200px" src="img/icons.png" alt=""> -->
                <h1>amor de mi vida</h1>

                <img class="logo-image" src="img/logo.png" alt="">

            </section>
             <section class="card-music">
                <article class="card-music-player">
                <div class="song-info">
                <h2>Life Eternal</h2>
                <p>Ghost</p>
                </div>

                <div class="barra-contenedor">
                <span>0:46</span>
                <div class="barra-fondo"><div class="progreso"></div></div>
                <span>-3:25</span>

                <div class="controles">
                <span>⏮</span><span>⏸</span> <span>⏭</span>
                </article>
                <div class="patron-puntos"></div>
            </section>
            <section class="card-image">
                <img  src="img/couple 1.png" alt="">
                <img  src="img/couple 2.png" alt="">
                <img  src="img/couple 3.png" alt="">
            </section>
        </div>
     </body>
</html>
